<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="login-box">

<h2>Sistema Pico y Placa</h2>

<!-- LOGIN -->
<form id="loginForm">

<input type="text" id="usuario" placeholder="Usuario" required>

<input type="password" id="password" placeholder="Contraseña" required>

<button type="submit">Entrar</button>

</form>

<p class="link" id="mostrarRegistro">Crear cuenta</p>

<!-- REGISTRO -->
<form id="registroForm" style="display:none;">

<input type="text" id="usuarioRegistro" placeholder="Nuevo usuario" required>

<input type="password" id="passwordRegistro" placeholder="Nueva contraseña" required>

<button type="submit">Registrar</button>

</form>

<p class="link" id="volverLogin" style="display:none;">Volver al login</p>

<p id="mensaje"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
